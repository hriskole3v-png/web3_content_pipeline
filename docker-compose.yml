# Spins the pipeline up as two composable stages. The Python service produces
# asset specs; the generator service consumes them and renders/uploads assets.
# In production these are triggered from n8n; locally they demonstrate the flow.

services:
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - MAX_ASSETS=${MAX_ASSETS:-10}
    volumes:
      - ./data:/app/data

  generator:
    build:
      context: .
      dockerfile: Dockerfile.generator
    env_file:
      - .env
    depends_on:
      - pipeline
